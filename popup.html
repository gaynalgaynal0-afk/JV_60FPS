<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JV-60FPS</title>
    <style>
        :root {
            --neon: #00e5ff;
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.6), 0 0 30px rgba(0, 229, 255, 0.4);
            --text-main: #ffffff;
            --text-dim: #9bb1c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #020024, #090979, #004e92, #0077b6, #00b4d8);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px; 
            height: 400px;
            overflow: hidden;
            perspective: 1000px;
            border-radius: 28px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            height: 92%;
            background: rgba(10, 15, 30, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 229, 255, 0.3);
            border: 2px solid rgba(0, 229, 255, 0.4);
            object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 229, 255, 0.5); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(0, 229, 255, 0.4);
        }

        p.subtitle {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 6px;
        }

        .switch-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            transform: scale(1.1);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 80px;
            height: 44px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 44px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 34px;
            width: 34px;
            left: 4px;
            bottom: 4px;
            background-color: #7a8b9e;
            transition: .5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.3);
        }

        input:checked + .slider {
            background-color: rgba(0, 229, 255, 0.2);
            border-color: var(--neon);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3), inset 0 0 15px rgba(0, 229, 255, 0.2);
        }

        input:checked + .slider:before {
            transform: translateX(36px);
            background-color: var(--neon);
            box-shadow: var(--neon-glow);
        }

        .status-text {
            margin-top: 18px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }

        .status-text.active {
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
            transform: scale(1.05);
        }

        .socials {
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            width: 100%;
        }

        .socials a {
            color: var(--text-dim);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .socials a svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .socials a:hover {
            color: var(--text-main);
            transform: translateY(-5px) scale(1.1);
            filter: drop-shadow(0 5px 10px rgba(0, 229, 255, 0.8));
        }

        /* ── Lock Screen ── */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(-45deg, #020024, #090979, #004e92, #0077b6, #00b4d8);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            border-radius: 28px;
        }

        #lockScreen.hidden { display: none; }

        .lock-box {
            width: 90%;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 28px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,229,255,0.05);
            animation: popIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        .lock-logo {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 2px solid rgba(0,229,255,0.4);
            box-shadow: 0 0 15px rgba(0,229,255,0.3);
            object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }

        .lock-title {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(0,229,255,0.4);
        }

        .lock-sub {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: -10px;
        }

        #idInput {
            width: 100%;
            padding: 11px 14px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,229,255,0.25);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
            text-align: center;
        }

        #idInput::placeholder { color: rgba(155,177,199,0.6); }

        #idInput:focus {
            border-color: var(--neon);
            box-shadow: 0 0 12px rgba(0,229,255,0.3);
        }

        .lock-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #unlockBtn {
            background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,229,255,0.1));
            border: 1px solid var(--neon);
            color: var(--neon);
            text-shadow: 0 0 8px rgba(0,229,255,0.6);
            box-shadow: 0 0 15px rgba(0,229,255,0.2);
        }

        #unlockBtn:hover {
            background: rgba(0,229,255,0.25);
            box-shadow: 0 0 25px rgba(0,229,255,0.4);
            transform: translateY(-2px);
        }

        #getIdBtn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        #getIdBtn:hover {
            border-color: rgba(0,229,255,0.4);
            color: #fff;
            transform: translateY(-2px);
        }

        #lockError {
            font-size: 11px;
            color: #ff4d6d;
            letter-spacing: 1px;
            text-align: center;
            min-height: 16px;
            font-weight: 700;
        }
    </style>
</head>
